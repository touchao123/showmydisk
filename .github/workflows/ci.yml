name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install clang (if needed)
        if: matrix.compiler == 'clang'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Build with ${{ matrix.compiler }}
        run: |
          CC=${{ matrix.compiler == 'gcc' && 'gcc' || 'clang' }} \
          CFLAGS="-Wall -Wextra -O2" \
          make

      - name: Check --help
        run: ./showmydisk --help

      - name: Check --version
        run: ./showmydisk --version

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t showmydisk .

      - name: Test Docker image
        run: docker run --rm showmydisk --help
